<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Jobi Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); width: 100%; max-width: 450px; text-align: center; border: 1px solid #D4AF37; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D4AF37; margin-bottom: 30px; }
        h2 { color: #1a1a1a; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #666; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
        input:focus { outline: none; border-color: #D4AF37; }
        .btn-login { width: 100%; padding: 14px; background: #D4AF37; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-login:hover { background: #AA8C2C; }
        .error-message { color: #e74c3c; margin-top: 15px; }
        .back-link { margin-top: 20px; display: inline-block; color: #D4AF37; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><i class="fas fa-crown"></i> JOBI EVENTS</div>
        <h2>Admin Login</h2>
        <form id="loginForm">
            <div class="form-group"><label>Username</label><input type="text" id="username" required placeholder="Enter username"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" required placeholder="Enter password"></div>
            <button type="submit" class="btn-login">Login</button>
            <div class="error-message" id="errorMessage"></div>
        </form>
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            const data = await res.json();
            if (data.success) window.location.href = data.redirect;
            else document.getElementById('errorMessage').textContent = data.error || 'Login failed';
        });
    </script>
</body>
</html>
